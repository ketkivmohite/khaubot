version: "3.9"

services:

  # ── PostgreSQL with pgvector ─────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: khaubot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/khaubot
    depends_on:
      - db

  # ── Django frontend ──────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./frontend:/app
    ports:
      - "8000:8000"
    environment:
      - KHAUBOT_API_URL=http://backend:8001
      - DEBUG=True
    depends_on:
      - backend

volumes:
  postgres_data:
