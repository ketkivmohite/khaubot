<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Your Stall – KhauBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <!-- Header -->
    <header class="bg-orange-500 py-6 text-center shadow-lg">
        <h1 class="text-4xl font-bold">🍛 KhauBot</h1>
        <p class="text-orange-100 mt-1">Register your food business — free, no paperwork!</p>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-10">

        {% if success %}
        <div class="bg-green-900 border border-green-500 text-green-200 px-6 py-5 rounded-2xl text-center">
            <p class="text-3xl mb-2">🎉</p>
            <p class="text-lg font-bold">You're registered!</p>
            <p class="text-sm mt-1">We'll review and approve your listing soon.</p>
            <a href="/" class="inline-block mt-4 bg-orange-500 px-5 py-2 rounded-xl text-white font-semibold">
                Back to Search
            </a>
        </div>

        {% else %}

        {% if error %}
        <div class="mb-6 bg-red-900 border border-red-500 text-red-200 px-4 py-3 rounded-xl">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm text-gray-400 mb-1">Business Name *</label>
                <input type="text" name="name" required
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Category *</label>
                <select name="category" required
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400">
                    <option value="street_stall">Street Stall</option>
                    <option value="cafe">Cafe</option>
                    <option value="cloud_kitchen">Cloud Kitchen</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Area *</label>
                    <input type="text" name="area" placeholder="e.g. Bandra" required
                        class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Full Address</label>
                    <input type="text" name="address" placeholder="e.g. Near Station"
                        class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
                </div>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Cuisine *</label>
                <input type="text" name="cuisine" placeholder="e.g. Street Food, North Indian" required
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Signature Dishes</label>
                <input type="text" name="signature_dishes" placeholder="e.g. Vada Pav, Misal Pav"
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Min Price (₹)</label>
                    <input type="number" name="price_min" value="20"
                        class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Max Price (₹)</label>
                    <input type="number" name="price_max" value="200"
                        class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Operating Hours</label>
                    <input type="text" name="operating_hours" placeholder="e.g. 8am - 10pm"
                        class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Open Days</label>
                    <input type="text" name="open_days" placeholder="e.g. Mon-Sat"
                        class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
                </div>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Contact Number *</label>
                <input type="text" name="contact" required
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">WhatsApp Link (optional)</label>
                <input type="text" name="whatsapp_link" placeholder="https://wa.me/91..."
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-orange-400"/>
            </div>

            <button type="submit"
                class="w-full bg-orange-500 hover:bg-orange-600 py-3 rounded-xl font-bold text-lg transition">
                Register My Stall 🍴
            </button>
        </form>
        {% endif %}
    </main>
</body>
</html>
